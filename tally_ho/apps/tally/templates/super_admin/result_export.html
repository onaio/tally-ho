{% extends 'base.html' %}

{% load i18n static %}

{% block content %}

<h1>{% trans 'Downloads' %}</h1>
<ul>
    <li><a href="{% url 'candidate-results' tally_id=tally_id %}">{% trans 'Candidate Final Results' %}</a></li>
    <li>
        <button class="btn btn-default download-btn"
                data-url="{% url 'result-export' tally_id=tally_id report='formresults' %}">
            {% trans 'Form Results' %}
        </button>
    </li>
    <li>
        <button class="btn btn-default download-btn"
                data-url="{% url 'result-export' tally_id=tally_id report='all-candidates' %}">
            {% trans 'All Candidate Votes' %}
        </button>
    </li>
    <li>
        <button class="btn btn-default download-btn"
                data-url="{% url 'result-export' tally_id=tally_id report='active-candidates' %}">
            {% trans 'Active Candidate Votes' %}
        </button>
    </li>
    <li><a href="{% url 'result-forms-with-duplicate-results' tally_id=tally_id %}">{% trans 'Result Forms With Duplicate Results' %}</a></li>
    <li><a href="{% url 'form-results' tally_id=tally_id %}">{% trans 'Public Site Results Report' %}</a></li>
</ul>

<script src="{% static 'js/export_download.js' %}"></script>

{% endblock %}
